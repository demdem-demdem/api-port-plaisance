name: Node.js CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '25'
        cache: 'npm'
        cache-dependency-path: './package-lock.json'

    - name: Install dependencies
      run: npm install

    - name: Get the public IP of the runner
      id: get-ip
      shell: bash
      run: |
        echo "ip-address=$(curl https://checkip.amazonaws.com)" >> "$GITHUB_OUTPUT"

    - name: Run JSDoc to verify documentation build
      run: npm run doc

    # Exemple d'exécution de tests avec les variables d'environnement
    - name: Run tests
      run: npx mocha tests/*.test.js
      env:
        SECRET_KEY: ${{ secrets.SECRET_KEY }}
        URL_MONGO: ${{ secrets.URL_MONGO }}
        URL_MONGO: mongodb://localhost:27017/api-port-test
